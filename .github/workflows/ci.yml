name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install project and dev dependencies
        run: |
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e .[dev]

      - name: Compile sources
        run: .venv/bin/python -m compileall pyffmpegcore tests examples

      - name: Run non-real-media tests
        run: .venv/bin/python -m pytest -m "not real_media"

      - name: Build package artifacts
        run: .venv/bin/python -m build

  real-media-smoke:
    runs-on: ubuntu-latest
    needs: fast-checks
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install project and dev dependencies
        run: |
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e .[dev]

      - name: Cache downloaded fixtures
        uses: actions/cache@v4
        with:
          path: tests/media/downloads
          key: real-media-${{ runner.os }}-${{ hashFiles('tests/media/manifest.json') }}

      - name: Download pinned media fixtures
        run: .venv/bin/python tests/media/download_fixtures.py

      - name: Run real-media smoke coverage
        run: |
          .venv/bin/python -m pytest \
            tests/examples/test_examples_smoke_real.py \
            tests/test_probe_real.py \
            tests/test_progress_real.py \
            tests/test_convert_real.py

  real-media-full:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    needs: fast-checks
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install project and dev dependencies
        run: |
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e .[dev]

      - name: Cache downloaded fixtures
        uses: actions/cache@v4
        with:
          path: tests/media/downloads
          key: real-media-${{ runner.os }}-${{ hashFiles('tests/media/manifest.json') }}

      - name: Download pinned media fixtures
        run: .venv/bin/python tests/media/download_fixtures.py

      - name: Run full real-media suite
        run: .venv/bin/python -m pytest -m real_media
